# ================================================================
# TRACKING PLATFORM — Главный конфигурационный файл
# Роботизированная поворотная платформа слежения
# Raspberry Pi 5 + Hailo-10H + Arducam PTZ + Cubemars AK64-80
# ================================================================

# ────────────────────────────────────────────────────────────────
# Система
# ────────────────────────────────────────────────────────────────
system:
  # Частота главного цикла (Гц)
  main_loop_hz: 60
  # Частота управления моторами (Гц)
  motor_control_hz: 100
  # Частота обновления HUD (Гц)
  hud_fps: 30
  # Режим при запуске: "manual" или "auto"
  default_mode: "manual"
  # Логирование
  log_level: "INFO"           # DEBUG, INFO, WARNING, ERROR
  log_to_file: true
  log_file: "logs/platform.log"

# ────────────────────────────────────────────────────────────────
# CAN-шина (Waveshare CAN HAT → Cubemars AK64-80)
# ────────────────────────────────────────────────────────────────
can:
  interface: "socketcan"
  channel: "can0"
  bitrate: 1000000            # 1 Мбит/с — стандарт Cubemars

# ────────────────────────────────────────────────────────────────
# Моторы Cubemars AK80-64 (24V)
# MIT Mode — полный контроль kp/kd/torque с хоста
#
# Параметры мотора AK80-64:
#   Gear Ratio: 64:1
#   Макс. момент на выходе: 18 Нм
#   Макс. скорость: 45 рад/с (на входе) → ~40°/с на выходе
#   Диапазон позиции: ±12.5 рад (±716°)
#   KP_MAX: 500, KD_MAX: 5.0, T_MAX: ±18 Нм
#   Напряжение: 24V
#
# MIT Mode формула мотора:
#   τ_out = kp*(θ_cmd - θ_act) + kd*(ω_cmd - ω_act) + τ_ff
#
# Нагрузка:
#   КОРД 12.7: ~40 кг на платформе
#   ПКТ 7.62:  ~25 кг на платформе
#   Yaw: ЦМ почти на оси вращения → малый момент инерции
#   Pitch: плечо ЦМ 18.6 мм от оси → гравитационный момент
# ────────────────────────────────────────────────────────────────
motors:
  horizontal:
    can_id: 1
    name: "Горизонт (Yaw)"
    min_angle_deg: -180.0
    max_angle_deg: 180.0
    max_speed_dps: 80.0       # °/с (ограничено для плавности с тяжёлой нагрузкой)
    # ── MIT Mode gains (слежение) ──
    # ЦМ на оси → малый гравитационный момент, но большая инерция (~40 кг)
    # kp: жёсткость позиционирования (0..500)
    #   Высокий kp → точное удержание, но возможны колебания
    #   Для 40 кг на оси: kp=80..120 — хороший баланс
    # kd: демпфирование (0..5.0)
    #   Гасит колебания и отдачу. Для тяжёлой нагрузки: kd=3.0..5.0
    kp: 100.0
    kd: 4.0
    # ── MIT Mode gains (стрельба — временно повышаем для гашения отдачи) ──
    # Отдача КОРД: дульная энергия 16229 Дж, импульс ~30 Н·с
    # При стрельбе увеличиваем kd для мгновенного гашения возмущения
    kp_firing: 150.0
    kd_firing: 5.0            # Максимум KD_MAX=5.0
    # ── Feedforward ──
    # Момент прямой связи по скорости (Нм·с/рад)
    # Компенсирует инерцию при слежении за движущейся целью
    velocity_ff_gain: 0.3
    # Гравитационная компенсация не нужна (ЦМ на оси)
    gravity_compensation_nm: 0.0
    direction: 1              # 1 или -1 для инверсии

  vertical:
    can_id: 2
    name: "Вертикаль (Pitch)"
    min_angle_deg: -30.0      # Ограничено конструкцией
    max_angle_deg: 60.0
    max_speed_dps: 50.0       # °/с (медленнее — несёт вес изделия)
    # ── MIT Mode gains (слежение) ──
    # Плечо ЦМ = 18.6 мм → гравитационный момент:
    #   КОРД: M_grav = 40 кг × 9.81 × 0.0186 м = 7.3 Нм
    #   ПКТ:  M_grav = 25 кг × 9.81 × 0.0186 м = 4.6 Нм
    # kp должен быть высоким для удержания веса + точность наведения
    # kd высокий для гашения вертикальной составляющей отдачи
    kp: 150.0
    kd: 4.5
    # ── MIT Mode gains (стрельба) ──
    kp_firing: 200.0
    kd_firing: 5.0            # Максимум
    # ── Feedforward ──
    velocity_ff_gain: 0.5
    # Гравитационная компенсация (Нм) — постоянный момент для удержания веса
    # Автоматически пересчитывается при переключении профиля вооружения:
    #   КОРД: 40 кг × 9.81 × 0.0186 = 7.3 Нм
    #   ПКТ:  25 кг × 9.81 × 0.0186 = 4.6 Нм
    gravity_compensation_nm: 7.3
    direction: 1

  # ── Параллакс камера-LRF ──
  # Камера и дальномер физически смещены друг от друга.
  # На ближних дистанциях это даёт заметную ошибку наведения.
  # Baseline измеряется линейкой между центрами оптики камеры и LRF.
  # ВАЖНО: измерьте на реальной конструкции и впишите точное значение!
  parallax:
    baseline_mm: 80.0         # Расстояние камера↔LRF (мм). Измерить!
    direction: "right"        # LRF правее камеры ("right"/"left"/"above"/"below")

  # ── Boresight (пристрелка) ──
  # Смещение оси ствола от оси камеры зависит от дистанции.
  # Заполняется при пристрелке на полигоне (см. инструкцию ниже).
  #
  # КАК ПРИСТРЕЛИВАТЬ:
  #   1. Установить мишень на 100 м
  #   2. Навести перекрестие камеры точно на центр мишени
  #   3. Произвести одиночный выстрел (или серию)
  #   4. Измерить смещение попадания от центра мишени:
  #      - Вправо/влево → yaw_mrad (+ = вправо)
  #      - Вверх/вниз   → pitch_mrad (+ = вверх)
  #      Формула: смещение_мрад = смещение_см / дистанция_м × 10
  #      Пример: попал на 5 см правее на 300 м → 5/300×10 = 0.17 мрад
  #   5. Записать в таблицу ниже
  #   6. Повторить для 300 м и 500 м (минимум 3 точки)
  #   7. Система автоматически интерполирует для промежуточных дистанций
  #
  # Формат: [дистанция_м, yaw_мрад, pitch_мрад]
  # Значения по умолчанию — нули (не пристреляно)
  boresight:
    - [100,  0.0,  0.0]
    - [300,  0.0,  0.0]
    - [500,  0.0,  0.0]

  # ── Параметры компенсации отдачи ──
  recoil:
    enabled: true
    # Время применения усиленных gains после выстрела (сек)
    boost_duration_sec: 0.12
    # Плечо ЦМ для расчёта гравитационной компенсации (м)
    pitch_arm_m: 0.0186
    # Масса нагрузки по профилям (кг) — для автоматического пересчёта
    mass_kord_kg: 40.0
    mass_pkt_kg: 25.0

# ────────────────────────────────────────────────────────────────
# Камера Arducam 5MP PTZ (CSI MIPI → разъём CAM0 на RPi5)
#
# Подключение: CSI шлейф (15-pin FPC) → CAM0 на Raspberry Pi 5
# Бэкенд захвата: Picamera2 (libcamera) — основной
#                 OpenCV — fallback для разработки на ПК
# Управление зумом: Arducam Python SDK (I2C) — оптический
#                   Picamera2 ScalerCrop — цифровой (если SDK нет)
# ────────────────────────────────────────────────────────────────
camera:
  device_index: 0             # CSI камера: 0=CAM0, 1=CAM1
  width: 1920
  height: 1080
  fps: 30
  # Оптический зум (управляется через I2C, Arducam PTZ SDK)
  zoom_min: 1.0
  zoom_max: 5.0
  zoom_step: 0.1
  zoom_default: 1.0
  # Поле зрения камеры при zoom=1x (градусы)
  fov_h_deg: 62.2
  fov_v_deg: 48.8

# ────────────────────────────────────────────────────────────────
# Лазерный дальномер Meskernel TS1224
# ────────────────────────────────────────────────────────────────
rangefinder:
  enabled: true
  port: "/dev/ttyAMA0"        # UART порт на RPi5
  baudrate: 115200
  timeout_sec: 0.1
  # Пределы дальности (метры)
  min_range_m: 3.0
  max_range_m: 1200.0
  # Частота опроса (Гц)
  poll_rate_hz: 10

# ────────────────────────────────────────────────────────────────
# Детекция и трекинг (YOLO26 + BoT-SORT на Hailo-10H)
# ────────────────────────────────────────────────────────────────
detection:
  # Модель YOLO26 (последняя версия Ultralytics, март 2026)
  # Для Hailo NPU: .hef (конвертировать через Hailo DFC)
  # Для Ultralytics fallback: .pt (локально на RPi5)
  model_path: "models/yolo26n.pt"
  # Порог уверенности детекции
  confidence_threshold: 0.40
  # Порог NMS (non-maximum suppression)
  nms_threshold: 0.5
  # Классы для детекции (COCO ID): 4=airplane, 0=person
  # Для дронов: дообучить модель на датасете Anti-UAV / DroneDetect
  target_classes: [4]
  # Размер входного изображения для модели
  input_size: 640
  # Использовать Hailo NPU (если доступен)
  use_hailo: true

tracker:
  # Тип трекера
  type: "botsort"
  # Максимальное количество кадров без детекции до потери цели
  max_age: 30
  # Минимальное количество детекций для подтверждения трека
  min_hits: 3
  # Порог IoU для ассоциации
  iou_threshold: 0.3

# ────────────────────────────────────────────────────────────────
# Джойстик Logitech X56 HOTAS (только правая ручка — РУС)
# ────────────────────────────────────────────────────────────────
joystick:
  device_index: 0
  # Оси
  axis_yaw: 0                 # Горизонт (крен стика влево-вправо)
  axis_pitch: 1               # Вертикаль (стик вперёд-назад)
  axis_zoom: 5                # Колёсико для зума (уточнить номер)
  # Инверсия
  invert_yaw: false
  invert_pitch: true          # Обычно Y-ось инвертирована
  # Мёртвая зона
  deadzone: 0.08
  # Кривая чувствительности (1.0=линейная, 2.0=квадратичная)
  sensitivity_exponent: 2.0
  # Множитель скорости
  speed_multiplier: 1.0
  # Кнопки (Logitech X56 HOTAS — правая ручка)
  # Раскладка для боевого применения:
  #   Триггер (указательный палец) → ОГОНЬ
  #   Кнопка A (большой палец)     → E-STOP
  #   Кнопка B (большой палец)     → Захват цели
  #   Кнопка C (большой палец)     → Замер дальности
  #   Кнопка D                     → Переключение КОРД ↔ ПКТ
  #   Pinky (мизинец)              → Переключение РУЧНОЙ ↔ АВТО
  button_fire: 0              # ОГОНЬ (триггер, указательный палец)
  button_estop: 1             # АВАРИЙНАЯ ОСТАНОВКА (кнопка A)
  button_lock_target: 2       # Захват / сброс цели (кнопка B)
  button_fire_rangefinder: 3  # Замер дальности лазером (кнопка C)
  button_switch_weapon: 4     # Переключение КОРД ↔ ПКТ (кнопка D)
  button_mode_toggle: 5       # Переключение РУЧНОЙ ↔ АВТО (Pinky)
  button_center: 6            # Возврат в центр (Hat Push или другая кнопка)

# ────────────────────────────────────────────────────────────────
# Автоматическое слежение (Auto-режим)
# ────────────────────────────────────────────────────────────────
autotrack:
  # PID-регулятор для удержания цели в центре кадра
  pid_yaw:
    kp: 0.5
    ki: 0.05
    kd: 0.15
  pid_pitch:
    kp: 0.5
    ki: 0.05
    kd: 0.15
  # Зона нечувствительности в центре кадра (пиксели)
  center_deadzone_px: 15
  # Максимальная скорость автослежения (градусов/сек)
  max_auto_speed_dps: 80.0

# ────────────────────────────────────────────────────────────────
# Баллистический калькулятор
# ────────────────────────────────────────────────────────────────
ballistics:
  # Активный профиль вооружения при запуске: "kord" или "pkt"
  active_profile: "kord"

  # Атмосферные условия
  atmosphere:
    gravity_mps2: 9.80665
    altitude_m: 150.0           # Высота над уровнем моря (м)
    temperature_c: 15.0         # Температура воздуха (°C)
    pressure_hpa: 1013.25       # Атмосферное давление (гПа)
    humidity_pct: 50.0          # Влажность воздуха (%)

  # Предсказание траектории цели
  prediction:
    horizon_sec: 3.0            # Горизонт предсказания (секунд вперёд)
    history_points: 30          # Количество точек истории

  # ── Профиль 1: КОРД — 12.7×108 мм ──
  # Крупнокалиберный пулемёт, НСВ «Утёс» / КОРД
  # Патрон: 12.7×108 мм (Б-32 бронебойно-зажигательная)
  profiles:
    kord:
      name: "КОРД 12.7×108"
      short_name: "КОРД"
      caliber_mm: 12.7
      cartridge: "12.7×108 Б-32"
      # Баллистика пули
      muzzle_velocity_mps: 820.0     # Начальная скорость (м/с)
      bullet_mass_g: 48.3            # Масса пули (грамм)
      bullet_diameter_mm: 12.98      # Диаметр пули (мм)
      bullet_length_mm: 64.0         # Длина пули (мм)
      # Баллистический коэффициент (G1 модель)
      # Б-32: BC ≈ 0.670 (G1) — тяжёлая бронебойная пуля
      ballistic_coefficient_g1: 0.670
      # Drag модель: "g1" или "g7"
      drag_model: "g1"
      # Темп стрельбы (выстр/мин) — для расчёта упреждения очередью
      rate_of_fire_rpm: 650
      # Эффективная дальность (м)
      effective_range_m: 2000
      # Максимальная дальность (м)
      max_range_m: 6000

    # ── Профиль 2: ПКТ — 7.62×54R мм ──
    # Пулемёт Калашникова танковый
    # Патрон: 7.62×54R (ЛПС — лёгкая пуля стальной сердечник)
    pkt:
      name: "ПКТ 7.62×54R"
      short_name: "ПКТ"
      caliber_mm: 7.62
      cartridge: "7.62×54R ЛПС"
      # Баллистика пули
      muzzle_velocity_mps: 855.0     # Начальная скорость (м/с)
      bullet_mass_g: 9.6             # Масса пули (грамм)
      bullet_diameter_mm: 7.92       # Диаметр пули (мм)
      bullet_length_mm: 28.6         # Длина пули (мм)
      # Баллистический коэффициент (G1 модель)
      # ЛПС: BC ≈ 0.395 (G1)
      ballistic_coefficient_g1: 0.395
      # Drag модель
      drag_model: "g1"
      # Темп стрельбы (выстр/мин)
      rate_of_fire_rpm: 700
      # Эффективная дальность (м)
      effective_range_m: 1500
      # Максимальная дальность (м)
      max_range_m: 3800

# ────────────────────────────────────────────────────────────────
# HUD (Head-Up Display / Прицел)
# ────────────────────────────────────────────────────────────────
hud:
  # Цвет прицела (BGR)
  color_reticle: [0, 255, 0]       # Зелёный
  color_locked: [0, 0, 255]        # Красный (цель захвачена)
  color_lead: [0, 255, 255]        # Жёлтый (точка перехвата)
  color_info: [0, 255, 0]          # Зелёный (информационный текст)
  # Толщина линий
  line_thickness: 1
  # Размер мил-дотов (пикселей)
  mil_dot_size: 3
  # Количество мил-дотов в каждую сторону от центра
  mil_dots_count: 5
  # Расстояние между мил-дотами (пикселей)
  mil_dot_spacing: 40
  # Шрифт
  font_scale: 0.5
  # Показывать информационную панель
  show_info_panel: true
  # Показывать шкалу углов платформы (вместо компаса — нет магнитометра)
  show_compass: false
  # Прозрачность оверлея (0.0 - 1.0)
  overlay_alpha: 0.7
